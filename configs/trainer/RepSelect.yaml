defaults:
  - finetune
  - /hydra/sweeper: RepSelect  # Load RepSelect-specific sweep params (used with --multirun)

handler: RepSelect
args:
  optim: sgd  # adam underperforms
  learning_rate: 0.2
  lr_scheduler_type: constant
  gradient_accumulation_steps: 1  # must be one, because RepSelect modifies gradients in-place

method_args:
  cfg:
    n_pcs: 400
    retain_momentum: 0.975
    lora_lr: 0.1
    lora_rank: 32
    npo_beta: 0.05